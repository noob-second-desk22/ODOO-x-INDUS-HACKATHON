<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Move History - CoreInventory</title>
    <link rel="stylesheet" href="../static/css/move_history.css">
</head>
<body>
{% include "./nav.html" %}
<form action="/transactions" method="post">

  <label>Type</label>
  <select name="type">
    <option value="Receipt">Receipt</option>
    <option value="Delivery">Delivery</option>
  </select>

  <label>SKU</label>
  <input type="text" name="SKU" required>

  <label>Category</label>
  <input type="text" name="category">

  <label>Quantity</label>
  <input type="number" step="0.01" name="quantity" required>

  <label>Schedule Date</label>
  <input type="datetime-local" name="schedule_date">

  <label>Status</label>
  <select name="status">
    <option value="Draft">Draft</option>
    <option value="Scheduled">Scheduled</option>
    <option value="Completed">Completed</option>
  </select>

  <label>From Location</label>
  <input type="text" name="from_location">

  <label>To Location</label>
  <input type="text" name="to_location">

  <button type="submit">Create Transaction</button>

</form>
</body>
</html>
