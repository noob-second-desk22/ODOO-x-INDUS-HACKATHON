<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Stock - CoreInventory</title>
    <link rel="stylesheet" href="../static/css/stock.css">
</head>

<body>

{% include "./nav.html" %}

<div class="stock-container">

    <h1>Inventory Stock</h1>

    <table>

        <thead>
            <tr>
                <th>ID</th>
                <th>Product Name</th>
                <th>SKU</th>
                <th>Category</th>
                <th>Unit</th>
                <th>Quantity</th>
            </tr>
        </thead>

        <tbody>

        {% for item in stock %}

        <tr>
            <td>{{ item.id }}</td>
            <td>{{ item.name }}</td>
            <td>{{ item.SKU }}</td>
            <td>{{ item.category }}</td>
            <td>{{ item.unit_of_measurement }}</td>
            <td>{{ item.quantity }}</td>
        </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

<footer>
    <p>CoreInventory</p>
</footer>

</body>
</html>
